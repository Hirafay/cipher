name: Build Cipher Multi-Platform

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Build Windows
        if: runner.os == 'Windows'
        run: npm run build-windows
        env:
          GYP_MSVS_VERSION: 2022
        run: npm run build-windows

      - name: Build Linux
        if: runner.os == 'Linux'
        run: npm run build-linux

      - name: Build macOS
        if: runner.os == 'macOS'
        run: npm run build-darwin

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cipher-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
          retention-days: 30
          if-no-files-found: ignore

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}